<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHG · gicons Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --hhg-yellow:#FFD400; --hhg-yellow-soft:#FFE766; --hhg-yellow-deep:#C9A600; --on-brand:#1A1A17;
    --ink:#F5F4EC; --body:#CFCDC2; --muted:#8E8C82; --hairline:#33332B;
    --canvas:#121210; --surface:#1C1C17; --surface-soft:#26261F;
    --sh-sm:0 1px 2px rgba(0,0,0,.4); --sh-md:0 4px 16px rgba(0,0,0,.45);
    --r-sm:6px; --r-md:10px; --r-lg:16px;
    --font:"Inter",-apple-system,"Segoe UI",sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;padding:48px 32px;font-family:var(--font);
       background:var(--canvas);color:var(--body);-webkit-font-smoothing:antialiased;}
  .head{text-align:center;margin-bottom:8px;}
  .eyebrow{display:inline-block;background:#161613;color:var(--hhg-yellow);font-size:11px;font-weight:600;
           letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:9999px;margin-bottom:10px;}
  h1{font-size:30px;font-weight:800;letter-spacing:-.02em;color:var(--ink);margin:0;}
  .sub{font-size:13px;color:var(--muted);margin-top:8px;}

  /* 체커보드 (투명 배경 확인) */
  .checker{background-color:#3a3a33;
    background-image:
      linear-gradient(45deg,#22221d 25%,transparent 25%),
      linear-gradient(-45deg,#22221d 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#22221d 75%),
      linear-gradient(-45deg,transparent 75%,#22221d 75%);
    background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;}

  /* 상단 스테이지: 미리보기 + 컨트롤 */
  .stage{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;
         max-width:880px;margin:24px auto 0;align-items:stretch;}
  .preview{border:1px solid var(--hairline);border-radius:var(--r-lg);box-shadow:var(--sh-md);
           min-height:340px;display:flex;align-items:center;justify-content:center;overflow:auto;padding:16px;}
  .preview img{display:none;image-rendering:auto;}
  .ph{color:var(--muted);font-size:14px;text-align:center;line-height:1.6;}

  .ctrl{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-lg);
        box-shadow:var(--sh-sm);padding:18px;display:flex;flex-direction:column;gap:14px;}
  .ctrl h2{font-size:11px;font-weight:700;margin:0;text-transform:uppercase;letter-spacing:.1em;color:var(--hhg-yellow-deep);}
  .sel-name{font-family:var(--mono);font-size:12px;color:var(--ink);word-break:break-all;min-height:16px;}
  .dim{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--ink);}
  .slider{display:flex;flex-direction:column;gap:4px;}
  .slider .lab{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--body);}
  .slider .lab .v{font-family:var(--mono);color:var(--muted);font-weight:500;}
  .slider input[type="range"]{width:100%;accent-color:var(--hhg-yellow);}
  .reset{align-self:flex-start;font-family:var(--font);font-size:11px;font-weight:600;color:var(--muted);
         background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;}
  .reset:hover{color:var(--ink);}
  .copy{font-family:var(--font);font-size:14px;font-weight:600;padding:11px 0;border:none;margin-top:auto;
        border-radius:var(--r-md);background:var(--hhg-yellow);color:var(--on-brand);cursor:pointer;transition:.12s;}
  .copy:hover{background:var(--hhg-yellow-deep);color:#fff;}
  .copy:disabled{opacity:.4;cursor:not-allowed;}

  /* 검색 + 카운트 */
  .toolbar{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:1100px;margin:32px auto 0;}
  .toolbar input[type="search"]{background:var(--surface-soft);border:1px solid var(--hairline);border-radius:var(--r-md);
           color:var(--ink);font-family:var(--font);font-size:14px;padding:9px 14px;width:260px;outline:none;}
  .toolbar input[type="search"]:focus{border-color:var(--hhg-yellow-deep);}
  .toolbar .count{font-family:var(--mono);font-size:12px;color:var(--muted);}

  .banner{display:none;max-width:760px;margin:20px auto 0;background:#2a1a14;border:1px solid #6b3a2a;
          border-radius:var(--r-lg);padding:14px 18px;color:#ffd0c0;font-size:13px;line-height:1.55;}
  .banner.show{display:block;}
  .banner code{font-family:var(--mono);background:#3a221a;padding:1px 6px;border-radius:4px;color:#ffe;}

  /* 선택용 그리드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;max-width:1100px;margin:16px auto 0;}
  .cell{background:var(--surface);border:1.5px solid var(--hairline);border-radius:var(--r-lg);
        padding:12px;box-shadow:var(--sh-sm);display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.12s;}
  .cell:hover{border-color:var(--muted);}
  .cell.active{border-color:var(--hhg-yellow);background:rgba(255,212,0,.08);}
  .cell .thumb{height:88px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;}
  .cell .thumb img{max-width:64px;max-height:64px;width:auto;height:auto;}
  .cell .nm{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;word-break:break-all;line-height:1.3;}
  .cell.active .nm{color:var(--ink);}
  .empty{max-width:760px;margin:40px auto;text-align:center;color:var(--muted);font-size:14px;line-height:1.7;}
  .empty code{font-family:var(--mono);background:var(--surface-soft);padding:1px 6px;border-radius:4px;color:var(--ink);}

  @media(max-width:760px){ .stage{grid-template-columns:1fr;} }
</style>
</head>
<body>
  <div class="head">
    <span class="eyebrow">HHG · gicons</span>
    <h1>gicons Gallery</h1>
    <div class="sub">아래에서 SVG 선택 → 크기 조정 → <code>copy html tag</code> (GitHub Pages 주소 + width/height)</div>
  </div>

  <!-- 미리보기 + 크기 컨트롤 -->
  <div class="stage">
    <div class="preview checker">
      <div class="ph" id="ph">아래 목록에서 SVG를 선택하세요</div>
      <img id="pv" alt="preview">
    </div>
    <div class="ctrl">
      <h2>size</h2>
      <div class="sel-name" id="selName">선택 안 됨</div>
      <div class="dim" id="dim">— × —</div>
      <div class="slider">
        <div class="lab"><span>가로 (W)</span><span class="v" id="wv">1.00×</span></div>
        <input type="range" id="wS" min="0.1" max="3" step="0.05" value="1">
      </div>
      <div class="slider">
        <div class="lab"><span>세로 (H)</span><span class="v" id="hv">1.00×</span></div>
        <input type="range" id="hS" min="0.1" max="3" step="0.05" value="1">
      </div>
      <button type="button" class="reset" id="reset">원본 크기(1.00×)로</button>
      <button type="button" class="copy" id="copy" disabled>copy html tag</button>
    </div>
  </div>

  <div class="toolbar">
    <input type="search" id="q" placeholder="이름으로 검색...">
    <span class="count" id="count"></span>
  </div>

  <div class="banner" id="banner"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"></div>

<script>
  // ───────── 설정 ─────────
  const PAGES_BASE = "https://onethelab.com/hhg-design-system/gicons/"; // 복사 주소 베이스 (끝 / 포함)
  const GH = { owner: "gunug", repo: "hhg-design-system", path: "gicons", branch: "main" };
  const LS_KEY = "hhg-gicons-gallery-v1";

  const grid = document.getElementById("grid");
  const banner = document.getElementById("banner");
  const empty = document.getElementById("empty");
  const countEl = document.getElementById("count");
  const qEl = document.getElementById("q");
  const pv = document.getElementById("pv");
  const ph = document.getElementById("ph");
  const selNameEl = document.getElementById("selName");
  const dimEl = document.getElementById("dim");
  const wS = document.getElementById("wS");
  const hS = document.getElementById("hS");
  const wv = document.getElementById("wv");
  const hv = document.getElementById("hv");
  const copyBtn = document.getElementById("copy");

  let ratio = 1;                 // 원본 = 1 기준 비율 (0.1~3), 가로·세로 동일 (비율 유지)
  let selected = null;           // { name, w0, h0 }

  // ───────── 상태 저장/복원 ─────────
  function save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ ratio, name: selected ? selected.name : null })); } catch (e) {}
  }
  function loadSaved() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { return {}; }
  }

  // ───────── svg 원본 크기 (viewBox 우선) ─────────
  async function svgDims(name) {
    try {
      const r = await fetch(name, { cache: "no-store" });
      if (r.ok) {
        const doc = new DOMParser().parseFromString(await r.text(), "image/svg+xml");
        const s = doc.querySelector("svg");
        if (s) {
          const vb = (s.getAttribute("viewBox") || "").split(/[\s,]+/).map(Number);
          if (vb.length === 4 && vb[2] > 0 && vb[3] > 0) return { w: vb[2], h: vb[3] };
          const w = parseFloat(s.getAttribute("width")), h = parseFloat(s.getAttribute("height"));
          if (w > 0 && h > 0) return { w, h };
        }
      }
    } catch (e) {}
    return { w: 100, h: 100 };
  }

  // ───────── 미리보기 렌더 ─────────
  function render() {
    if (!selected) {
      pv.style.display = "none"; ph.style.display = "block";
      dimEl.textContent = "— × —"; copyBtn.disabled = true;
      wv.textContent = ratio.toFixed(2) + "×"; hv.textContent = ratio.toFixed(2) + "×";
      return;
    }
    const W = Math.round(selected.w0 * ratio), H = Math.round(selected.h0 * ratio);
    pv.style.width = W + "px"; pv.style.height = H + "px";
    pv.style.display = "block"; ph.style.display = "none";
    dimEl.textContent = W + " × " + H + " px";
    wv.textContent = ratio.toFixed(2) + "× (" + W + "px)";
    hv.textContent = ratio.toFixed(2) + "× (" + H + "px)";
    copyBtn.disabled = false;
  }

  async function select(name, cell) {
    selected = { name, w0: 100, h0: 100 };
    pv.src = name;                       // 상대경로 (로컬·Pages 동작)
    selNameEl.textContent = name;
    grid.querySelectorAll(".cell.active").forEach(c => c.classList.remove("active"));
    if (cell) cell.classList.add("active");
    const d = await svgDims(name);
    selected.w0 = d.w; selected.h0 = d.h;
    render(); save();
  }

  // ───────── 슬라이더 (가로/세로 연동 = 비율 유지) ─────────
  wS.addEventListener("input", () => { ratio = parseFloat(wS.value); hS.value = ratio; render(); save(); });
  hS.addEventListener("input", () => { ratio = parseFloat(hS.value); wS.value = ratio; render(); save(); });
  document.getElementById("reset").addEventListener("click", () => {
    ratio = 1; wS.value = 1; hS.value = 1; render(); save();
  });

  // ───────── 클립보드 ─────────
  async function copyText(text) {
    try { if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); return true; } } catch (e) {}
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand("copy"); document.body.removeChild(ta); return ok;
    } catch (e) { return false; }
  }
  copyBtn.addEventListener("click", async () => {
    if (!selected) return;
    const W = Math.round(selected.w0 * ratio), H = Math.round(selected.h0 * ratio);
    const alt = selected.name.replace(/\.svg$/i, "");
    const tag = '<img src="' + PAGES_BASE + selected.name + '" alt="' + alt + '" width="' + W + '" height="' + H + '">';
    const ok = await copyText(tag);
    copyBtn.textContent = ok ? "copied!" : "copy fail";
    setTimeout(() => { copyBtn.textContent = "copy html tag"; }, 1200);
  });

  // ───────── svg 목록 수집 (autoindex → GitHub API → icons.json) ─────────
  async function listAutoindex() {
    try {
      const res = await fetch("./", { cache: "no-store" });
      if (!res.ok) return [];
      if (!(res.headers.get("content-type") || "").includes("text/html")) return [];
      const doc = new DOMParser().parseFromString(await res.text(), "text/html");
      const names = [...doc.querySelectorAll("a[href]")]
        .map(a => decodeURIComponent(a.getAttribute("href")))
        .filter(h => /\.svg$/i.test(h)).map(h => h.split("/").pop());
      return [...new Set(names)];
    } catch (e) { return []; }
  }
  async function listGitHub() {
    try {
      const url = "https://api.github.com/repos/" + GH.owner + "/" + GH.repo + "/contents/" + GH.path + "?ref=" + GH.branch;
      const res = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
      if (!res.ok) return [];
      const arr = await res.json();
      return Array.isArray(arr) ? arr.filter(it => it.type === "file" && /\.svg$/i.test(it.name)).map(it => it.name) : [];
    } catch (e) { return []; }
  }
  async function listManifest() {
    try {
      const res = await fetch("icons.json", { cache: "no-store" });
      if (!res.ok) return [];
      const arr = await res.json();
      return Array.isArray(arr) ? arr.filter(n => /\.svg$/i.test(n)) : [];
    } catch (e) { return []; }
  }
  async function collect() {
    for (const fn of [listAutoindex, listGitHub, listManifest]) {
      const list = await fn();
      if (list.length) return list.sort((a, b) => a.localeCompare(b));
    }
    return [];
  }

  // ───────── 셀 빌더 ─────────
  function buildCell(name) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.name = name.toLowerCase();
    const thumb = document.createElement("div");
    thumb.className = "thumb checker";
    const img = document.createElement("img");
    img.src = name; img.alt = name; img.loading = "lazy";
    thumb.appendChild(img);
    const nm = document.createElement("div");
    nm.className = "nm"; nm.textContent = name;
    cell.appendChild(thumb); cell.appendChild(nm);
    cell.addEventListener("click", () => select(name, cell));
    return cell;
  }

  // ───────── 검색 ─────────
  qEl.addEventListener("input", () => {
    const q = qEl.value.trim().toLowerCase();
    let shown = 0;
    grid.querySelectorAll(".cell").forEach(c => {
      const hit = !q || c.dataset.name.includes(q);
      c.style.display = hit ? "" : "none";
      if (hit) shown++;
    });
    countEl.textContent = shown + " 개";
  });

  // ───────── 초기화 ─────────
  (async function init() {
    // 저장된 비율 먼저 복원
    const saved = loadSaved();
    if (typeof saved.ratio === "number" && saved.ratio >= 0.1 && saved.ratio <= 3) {
      ratio = saved.ratio; wS.value = ratio; hS.value = ratio;
    }
    render();

    const names = await collect();
    if (!names.length) {
      const isFile = location.protocol === "file:";
      empty.style.display = "block";
      empty.innerHTML = isFile
        ? "SVG 목록을 못 읽었습니다. <b><code>file://</code> 직접 열기는 막혀 있습니다.</b><br>" +
          "<code>gicons/</code> 폴더에서 <code>python -m http.server 8000</code> 후 " +
          "<code>http://localhost:8000/gallery.html</code> 접속하세요.<br>" +
          "또는 <code>.svg</code> 추가 후 GitHub에 push 하면 Pages에서 자동 표시됩니다."
        : "이 폴더에 <code>.svg</code> 파일이 없습니다. SVG를 추가하고 새로고침(또는 push) 하세요.";
      countEl.textContent = "0 개";
      return;
    }
    const frag = document.createDocumentFragment();
    const cellByName = {};
    names.forEach(n => { const c = buildCell(n); cellByName[n] = c; frag.appendChild(c); });
    grid.appendChild(frag);
    countEl.textContent = names.length + " 개";

    // 저장된 선택 복원
    if (saved.name && cellByName[saved.name]) select(saved.name, cellByName[saved.name]);
  })();
</script>
</body>
</html>
